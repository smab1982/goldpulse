name: GoldPulse

on:
  schedule:
    - cron: "*/30 * * * *"     # every 30 minutes (GitHub may delay a few minutes under load)
  workflow_dispatch: {}          # adds a manual "Run workflow" button for testing

permissions:
  contents: write                # lets the job save its memory (goldpulse_state.json) back to the repo

concurrency:
  group: goldpulse               # never let two runs overlap
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Run GoldPulse check
        env:
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
          NTFY_TOPIC:      ${{ secrets.NTFY_TOPIC }}
          RUN_ONCE:        "1"
        run: python goldpulse_server.py

      - name: Save memory between runs
        run: |
          if [ -n "$(git status --porcelain goldpulse_state.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add goldpulse_state.json
            git commit -m "update state [skip ci]"
            git push
          else
            echo "no state change this run"
          fi
